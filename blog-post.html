<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <title>Blog Post | Hi Fi PDF Tool Kit</title>
  <meta name="description" content="Read our latest insights on PDF optimization and security.">
  <meta name="theme-color" content="#6C5CE7">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
  <div class="ambient-bg"></div>

  <!-- Top Navigation -->
  <header class="top-nav" id="topNav">
    <a href="index.html" class="top-nav__brand">
      <svg width="32" height="32" viewBox="0 0 100 100" style="border-radius:8px"><rect rx="20" width="100" height="100" fill="#6C5CE7"/><text x="50" y="68" text-anchor="middle" fill="white" font-size="42" font-family="Arial" font-weight="bold">HF</text></svg>
      Hi Fi PDF
    </a>
    <div class="top-nav__actions">
      <a href="blog.html" class="btn btn--secondary btn--sm" style="border-radius:var(--radius-full); margin-right:8px;">All Blogs</a>
      <button class="top-nav__btn" id="themeToggle" onclick="HiFiApp.toggleTheme()" aria-label="Toggle theme">
        <i class="fas fa-moon"></i>
      </button>
    </div>
  </header>

  <article class="blog-post">
    <!-- Hero Image 3D Container -->
    <div class="blog-hero" id="blogHero" data-aos="fade-down" data-aos-duration="1000">
      <div class="container" style="position:relative; z-index:2; padding:var(--space-xl) var(--container-padding); text-align:center;">
        <span class="chip chip--primary" id="blogTag" style="margin-bottom:var(--space-md);">Tag</span>
        <h1 id="blogTitle" style="font-size:var(--fs-3xl); margin-bottom:var(--space-md); color:#fff; text-shadow:0 4px 10px rgba(0,0,0,0.5);">Loading...</h1>
        <div id="blogMeta" style="color:rgba(255,255,255,0.8); font-size:var(--fs-sm);"></div>
      </div>
      <div class="blog-hero__overlay"></div>
    </div>

    <!-- Content -->
    <div class="container" style="max-width:800px; padding:var(--space-2xl) var(--container-padding);" data-aos="fade-up" data-aos-delay="300">
      <div id="blogContent" class="blog-content" style="font-size:1.1rem; line-height:1.8; color:var(--text-primary);">
        <!-- Injected -->
      </div>
    </div>
  </article>

  <footer class="footer mt-xl" data-aos="fade-in">
    <div class="footer__links">
      <a href="about.html">About Us</a>
      <a href="contact.html">Contact</a>
      <a href="privacy.html">Privacy Policy</a>
      <a href="disclaimer.html">Disclaimer</a>
    </div>
    <p class="footer__copy">© 2026 Hi Fi PDF Tool Kit. All rights reserved.</p>
  </footer>

  <nav class="bottom-nav" id="bottomNav">
    <a href="index.html" class="bottom-nav__item"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="tool.html?id=compress-pdf" class="bottom-nav__item"><i class="fas fa-compress-arrows-alt"></i><span>Compress</span></a>
    <a href="blog.html" class="bottom-nav__item active"><i class="fas fa-book"></i><span>Blog</span></a>
    <a href="tool.html?id=merge-pdf" class="bottom-nav__item"><i class="fas fa-object-group"></i><span>Merge</span></a>
    <a href="tool.html?id=recent-history" class="bottom-nav__item"><i class="fas fa-history"></i><span>Recent</span></a>
  </nav>

  <style>
    /* Premium Blog Details Styling */
    .blog-hero {
      position: relative;
      width: 100%;
      height: 40vh;
      min-height: 350px;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 4px solid var(--primary);
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .blog-hero__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(15,15,26,0.6), rgba(15,15,26,0.8));
      z-index: 1;
    }
    .blog-content h2 {
      font-size: var(--fs-2xl);
      color: var(--primary);
      margin: var(--space-xl) 0 var(--space-md);
    }
    .blog-content h3 {
      font-size: var(--fs-xl);
      margin: var(--space-lg) 0 var(--space-sm);
    }
    .blog-content p {
      margin-bottom: var(--space-lg);
      font-size: 1.05rem;
    }
    .blog-content a {
      color: var(--primary);
      text-decoration: underline;
      font-weight: bold;
    }
  </style>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="js/tools-config.js"></script>
  <script src="js/blogs-config.js"></script>
  <script src="js/app.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const postId = params.get('id');
      const post = BLOG_POSTS.find(p => p.id === postId);

      if (!post) {
        document.getElementById('blogTitle').innerText = 'Post Not Found';
        document.getElementById('blogContent').innerText = 'The requested blog post doesn\'t exist.';
        return;
      }

      // Populate UI
      document.title = post.title + ' | Hi Fi PDF Blog';
      document.querySelector('meta[name="description"]').setAttribute('content', post.excerpt);
      
      document.getElementById('blogHero').style.backgroundImage = `url('${post.image}')`;
      document.getElementById('blogTitle').innerText = post.title;
      document.getElementById('blogTag').innerText = post.primaryTag;
      document.getElementById('blogMeta').innerHTML = `<span><i class="far fa-calendar-alt"></i> ${post.date}</span> &nbsp;|&nbsp; <span><i class="far fa-clock"></i> ${post.readTime}</span>`;
      document.getElementById('blogContent').innerHTML = post.content;

      // Inject JSON-LD Schema
      const schema = {
        "@context": "https://schema.org",
        "@type": "BlogPosting",
        "headline": post.title,
        "image": window.location.origin + '/' + post.image,
        "datePublished": post.date,
        "description": post.excerpt,
        "author": { "@type": "Organization", "name": "Hi Fi PDF Team" },
        "publisher": { "@type": "Organization", "name": "Hi Fi PDF Tool Kit", "logo": { "@type": "ImageObject", "url": window.location.origin + "/favicon.ico" } }
      };
      const script = document.createElement('script');
      script.type = 'application/ld+json';
      script.textContent = JSON.stringify(schema);
      document.head.appendChild(script);
    });
  </script>
</body>
</html>
