  <style>
    /* 3D Blog Card Styling */
    .blog-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      transition: box-shadow 0.4s ease;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      height: 100%;
      border: 1px solid var(--border-light);
      cursor: pointer;
      transform-style: preserve-3d;
      will-change: transform;
    }
    .blog-card:hover {
      box-shadow: 0 20px 40px rgba(108, 92, 231, 0.2);
      border-color: var(--primary-light);
    }
    .blog-card__image-container {
      width: 100%;
      height: 200px;
      overflow: hidden;
      position: relative;
      transform: translateZ(30px); /* 3D pop out */
      transform-style: preserve-3d;
    }
    .blog-card__image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s ease;
    }
    .blog-card:hover .blog-card__image {
      transform: scale(1.05);
    }
    .blog-card__content {
      padding: var(--space-base);
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      transform: translateZ(20px); /* text pops out */
    }
    .blog-card__meta {
      font-size: var(--fs-xs);
      color: var(--text-tertiary);
      margin-bottom: var(--space-sm);
      display: flex;
      justify-content: space-between;
    }
    .blog-card__title {
      font-size: var(--fs-lg);
      font-weight: var(--fw-bold);
      margin-bottom: var(--space-sm);
      line-height: var(--lh-tight);
      color: var(--text-primary);
    }
    .blog-card__excerpt {
      font-size: var(--fs-sm);
      color: var(--text-secondary);
      flex-grow: 1;
    }
    .blog-card__tag {
      position: absolute;
      top: 10px;
      right: 10px;
      background: var(--primary-gradient);
      color: white;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.65rem;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(108, 92, 231, 0.4);
      transform: translateZ(40px);
    }
  </style>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="js/tools-config.js"></script>
  <script src="js/blogs-config.js"></script>
  <script src="js/app.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const grid = document.getElementById('blogGrid');
      grid.innerHTML = BLOG_POSTS.map((post, i) => `
        <a href="blog-post.html?id=${post.id}" class="blog-card animate-slide-up" style="animation-delay: ${i * 0.15}s; animation-fill-mode: both;" data-tilt data-tilt-max="10" data-tilt-speed="400" data-tilt-glare="true" data-tilt-max-glare="0.3">
          <div class="blog-card__image-container">
             <div class="blog-card__tag">${post.primaryTag}</div>
             <img src="${post.image}" alt="${post.title}" class="blog-card__image" loading="lazy">
          </div>
          <div class="blog-card__content">
            <div class="blog-card__meta">
              <span><i class="far fa-calendar-alt"></i> ${post.date}</span>
              <span><i class="far fa-clock"></i> ${post.readTime}</span>
            </div>
            <h2 class="blog-card__title">${post.title}</h2>
            <p class="blog-card__excerpt">${post.excerpt}</p>
          </div>
        </a>
      `).join('');

      // Initialize Tilt
      if (typeof VanillaTilt !== "undefined") {
        VanillaTilt.init(document.querySelectorAll(".blog-card"));
      }
    });
  </script>
</body>
