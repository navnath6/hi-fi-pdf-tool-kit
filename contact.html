  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us — Hi Fi PDF Tool Kit</title>
  <meta name="description" content="Contact Hi Fi PDF Tool Kit for support, feedback, or partnerships.">
  <meta name="theme-color" content="#6C5CE7">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%236C5CE7'/><text x='50' y='68' text-anchor='middle' fill='white' font-size='42' font-family='Arial' font-weight='bold'>HF</text></svg>">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="top-nav"><a href="index.html" class="top-nav__brand" style="font-size:1rem"><i class="fas fa-arrow-left" style="-webkit-text-fill-color:var(--text-primary);margin-right:8px"></i> Hi Fi PDF</a><div class="top-nav__actions"><button class="top-nav__btn" id="themeToggle" onclick="HiFiApp.toggleTheme()"><i class="fas fa-moon"></i></button></div></header>
  <div class="container" style="padding:var(--space-xl) var(--container-padding)">
    <h1 style="margin-bottom:var(--space-lg)">Contact Us</h1>
    <p style="margin-bottom:var(--space-xl)">Have questions, feedback, or partnership inquiries? We'd love to hear from you!</p>
    <form id="contactForm" onsubmit="event.preventDefault();HiFiApp.toast('Message sent! We will reply soon.','success');this.reset()">
      <div style="margin-bottom:var(--space-base)">
        <label style="display:block;font-size:var(--fs-sm);font-weight:var(--fw-semibold);margin-bottom:var(--space-xs)">Name</label>
        <input type="text" required placeholder="Your name" style="width:100%;padding:var(--space-md);border-radius:var(--radius-md);border:1.5px solid var(--border);background:var(--bg-card);color:var(--text-primary);font-size:var(--fs-base);outline:none">
      </div>
      <div style="margin-bottom:var(--space-base)">
        <label style="display:block;font-size:var(--fs-sm);font-weight:var(--fw-semibold);margin-bottom:var(--space-xs)">Email</label>
        <input type="email" required placeholder="your@email.com" style="width:100%;padding:var(--space-md);border-radius:var(--radius-md);border:1.5px solid var(--border);background:var(--bg-card);color:var(--text-primary);font-size:var(--fs-base);outline:none">
      </div>
      <div style="margin-bottom:var(--space-lg)">
        <label style="display:block;font-size:var(--fs-sm);font-weight:var(--fw-semibold);margin-bottom:var(--space-xs)">Message</label>
        <textarea required placeholder="Your message..." rows="5" style="width:100%;padding:var(--space-md);border-radius:var(--radius-md);border:1.5px solid var(--border);background:var(--bg-card);color:var(--text-primary);font-size:var(--fs-base);outline:none;resize:vertical"></textarea>
      </div>
      <button type="submit" class="btn btn--primary btn--block"><i class="fas fa-paper-plane"></i> Send Message</button>
    </form>
  </div>
  <footer class="footer"><div class="footer__links"><a href="index.html">Home</a><a href="about.html">About</a><a href="privacy.html">Privacy</a><a href="disclaimer.html">Disclaimer</a></div><p class="footer__copy">© 2026 Hi Fi PDF Tool Kit</p></footer>
  <nav class="bottom-nav"><a href="index.html" class="bottom-nav__item"><i class="fas fa-home"></i><span>Home</span></a><a href="tool.html?id=compress-pdf" class="bottom-nav__item"><i class="fas fa-compress-arrows-alt"></i><span>Compress</span></a><a href="tool.html?id=merge-pdf" class="bottom-nav__item"><i class="fas fa-object-group"></i><span>Merge</span></a><a href="tool.html?id=jpg-to-pdf" class="bottom-nav__item"><i class="fas fa-image"></i><span>Convert</span></a><a href="tool.html?id=recent-history" class="bottom-nav__item"><i class="fas fa-history"></i><span>Recent</span></a></nav>
  <script src="js/tools-config.js"></script><script src="js/app.js"></script>
</body>
</html>
